name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tier1:
    name: "Tier 1: Init Command Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install CLI dependencies
        run: cd cli && npm ci
      - name: Run Tier 1 tests (init file verification)
        run: npm run test:integration:tier1
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

  integration-tier2:
    name: "Tier 2: Message Send/Receive"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Tier 2 tests (API messaging)
        run: npm run test:integration:tier2
        env:
          MOCK_AUTH: "true"
          NODE_ENV: "test"
          SESSION_SECRET: "ci-integration-secret"
          AWS_REGION: "us-east-1"

  integration-tier3:
    name: "Tier 3: Copilot E2E (planned)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Tier 3 tests (extension validation)
        run: npm run test:integration:tier3
        env:
          NODE_OPTIONS: "--experimental-vm-modules"
      # Future: when Copilot CLI supports scripting mode
      # - name: Setup Copilot token
      #   run: echo "${{ secrets.COPILOT_TOKEN }}" | gh auth login --with-token
      # - name: Run full Copilot e2e
      #   run: npm run test:integration:tier3:full
